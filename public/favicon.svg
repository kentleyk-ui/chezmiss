<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background -->
  <rect width="192" height="192" fill="#080508" rx="45"/>

  <!-- Heart shape (main logo element) -->
  <g transform="translate(96, 96)">
    <!-- Heart outline in gold -->
    <path d="M 0,-25 C -25,-50 -60,-35 -60,0 C -60,35 0,70 0,70 C 0,70 60,35 60,0 C 60,-35 25,-50 0,-25 Z"
          fill="#B79A5B"
          filter="drop-shadow(0 0 12px rgba(183,154,91,0.5))"/>

    <!-- Inner highlight -->
    <path d="M 0,-25 C -25,-50 -60,-35 -60,0 C -60,35 0,70 0,70 C 0,70 60,35 60,0 C 60,-35 25,-50 0,-25 Z"
          fill="#B79A5B"
          opacity="0.8"/>
  </g>

  <!-- Subtle gradient border -->
  <rect width="192" height="192" fill="none"
        stroke="url(#gradBorder)" stroke-width="1.5" rx="45"/>

  <defs>
    <linearGradient id="gradBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B79A5B;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#B79A5B;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#B79A5B;stop-opacity:0.6" />
    </linearGradient>
  </defs>
</svg>
